<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Mylife Full Preview</title>
<style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
      color: #0f172a;
      background: linear-gradient(180deg,#fff7ed 0%, #ffffff 22%, #fdf4ff 58%, #eff6ff 100%);
    }
    .hidden { display: none !important; }
    .page { min-height: 100vh; padding: 24px; }
    .shell { max-width: 1320px; margin: 0 auto; }
    .card {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: 24px;
      box-shadow: 0 16px 40px rgba(15,23,42,0.08);
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 9999px;
      border: none;
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: .2s ease;
      text-decoration: none;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary { background: linear-gradient(135deg,#0f172a,#4338ca); color: #fff; }
    .btn-secondary { background: #fff; color: #0f172a; border: 1px solid #cbd5e1; }
    .btn-danger { background: #fff; color: #b91c1c; border: 1px solid #fecaca; }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 12px; border-radius: 9999px; border: 1px solid #e2e8f0;
      background: rgba(255,255,255,.92); font-size: 12px; font-weight: 700; color: #475569;
    }
    input, textarea {
      width: 100%; border: 1px solid #cbd5e1; border-radius: 16px; padding: 12px 14px;
      font-size: 14px; background: #fff; outline: none;
    }
    textarea { min-height: 120px; resize: vertical; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .hero {
      min-height: calc(100vh - 48px);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      align-items: center;
    }
    .avatar-shell {
      display: flex; flex-direction: column; align-items: center; gap: 20px;
    }
    .avatar-circle-wrap { position: relative; }
    .avatar-glow {
      position: absolute; inset: 0; border-radius: 999px; background: rgba(251,207,232,0.6); filter: blur(48px);
    }
    .avatar-circle {
      position: relative;
      width: 320px; height: 320px; border-radius: 999px; overflow: hidden;
      border: 1px solid rgba(255,255,255,0.8); background: rgba(255,255,255,0.8);
      box-shadow: 0 20px 50px rgba(15,23,42,0.15);
      display: flex; align-items: center; justify-content: center;
    }
    .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }
    .anime-overlay {
      pointer-events: none; position: absolute; inset: 0;
      background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.55), transparent 35%),
                  linear-gradient(135deg, rgba(255,182,193,0.16), rgba(147,197,253,0.16));
    }
    .default-avatar {
      width: 220px; height: 220px; border-radius: 999px; display: flex; align-items: center; justify-content: center;
      font-size: 84px; box-shadow: inset 0 4px 20px rgba(255,255,255,0.5);
    }
    .avatar-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .avatar-choice {
      position: relative; height: 64px; border-radius: 18px; border: 1px solid transparent;
      font-size: 28px; cursor: pointer; background: #fff;
    }
    .avatar-choice.active { border: 2px solid #0f172a; }
    .topbar {
      display: flex; justify-content: space-between; align-items: center; gap: 16px;
      margin-bottom: 26px; flex-wrap: wrap;
    }
    .mapbox {
      position: relative; overflow: hidden; min-height: 620px; border-radius: 28px;
      border: 1px solid rgba(226,232,240,0.85);
      background: radial-gradient(circle at top, #e0f2fe 0%, #eef2ff 36%, #ffffff 76%);
      padding: 24px;
    }
    .map-fx {
      position: absolute; inset: 0; pointer-events: none;
      background:
        radial-gradient(circle at 18% 30%, rgba(125,211,252,0.18), transparent 18%),
        radial-gradient(circle at 80% 24%, rgba(196,181,253,0.18), transparent 20%),
        radial-gradient(circle at 56% 72%, rgba(251,191,36,0.10), transparent 18%);
    }
    .pin {
      position: absolute; transform: translate(-50%,-50%); border: none; background: transparent;
      padding: 0; cursor: pointer; color: #64748b; font-size: 18px; font-weight: 700;
      line-height: 1; white-space: nowrap; transition: .25s ease;
    }
    .pin.active {
      color: #4f46e5; transform: translate(-50%,-50%) scale(1.12);
      text-shadow: 0 8px 24px rgba(79,70,229,0.28);
    }
    .pin:hover { color: #2563eb; transform: translate(-50%,-50%) scale(1.06); }
    .section-title { font-size: 28px; font-weight: 800; color: #0f172a; }
    .options-grid {
      display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 12px;
    }
    .option-btn {
      width: 100%; position: relative; border-radius: 18px; border: 1px solid transparent;
      padding: 12px; text-align: left; cursor: pointer; transition: .2s ease;
    }
    .option-btn.active {
      background: #0f172a !important; color: #fff !important;
      box-shadow: 0 10px 24px rgba(15,23,42,0.16);
      border-color: #0f172a;
    }
    .count-grid { display:grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap:12px; }
    .timeline { position: relative; padding-left: 16px; }
    .timeline-line {
      position: absolute; left: 18px; top: 4px; bottom: 4px; width: 2px;
      background: linear-gradient(180deg,#ddd6fe,#bfdbfe);
    }
    .timeline-list { display: grid; gap: 22px; }
    @keyframes timelineRise {
      from { opacity: 0; transform: translateY(22px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes softGlow {
      0% { box-shadow: 0 0 0 rgba(37,99,235,0); }
      50% { box-shadow: 0 16px 40px rgba(37,99,235,0.10); }
      100% { box-shadow: 0 8px 24px rgba(15,23,42,0.05); }
    }
    .timeline-list .event-card { opacity: 0; animation: timelineRise .55s ease forwards, softGlow .8s ease forwards; }
    .timeline-list .overview-card { opacity: 0; animation: timelineRise .55s ease forwards; }
    .event-card:hover, .overview-card:hover { transform: translateY(-2px); transition: transform .2s ease; }
    .overview-poster {
      background: linear-gradient(180deg,#ffffff 0%, #f8fbff 28%, #f8fafc 100%);
      border-radius: 30px; border: 1px solid #e2e8f0; padding: 22px; overflow: visible;
    }
    .overview-hero {
      position: relative; border-radius: 28px; padding: 28px; margin-bottom: 22px;
      background: linear-gradient(135deg, rgba(219,234,254,0.9), rgba(238,242,255,0.92) 50%, rgba(250,245,255,0.95));
      border: 1px solid rgba(191,219,254,0.7);
    }
    .overview-hero::after {
      content: ""; position: absolute; right: -40px; top: -40px; width: 180px; height: 180px; border-radius: 999px;
      background: radial-gradient(circle, rgba(96,165,250,0.25), rgba(96,165,250,0));
    }
    .metric-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(210px,1fr)); gap:16px; margin-bottom:20px; }
    .metric-card { border-radius:24px; padding:18px; border:1px solid #e2e8f0; background:#fff; box-shadow:0 10px 28px rgba(15,23,42,0.05); }
    .stage-grid { display:grid; gap:16px; }
    .stage-poster-card { border-radius:24px; background:#fff; border:1px solid #e2e8f0; padding:18px; box-shadow:0 12px 30px rgba(15,23,42,0.05); }

    .overview-poster, .stage-poster-card, .overview-card, .metric-card { min-width: 0; }
    .overview-poster *, .stage-poster-card *, .overview-card * { word-break: break-word; overflow-wrap: anywhere; }
    .place-cloud { display:flex; flex-wrap:wrap; gap:10px; }
    .place-chip { padding:7px 12px; border-radius:999px; background:#eef6ff; color:#1d4ed8; font-size:12px; font-weight:700; border:1px solid #dbeafe; }
    .event-card, .overview-card {
      position: relative; border-radius: 24px; border: 1px solid #e2e8f0; padding: 20px;
    }
    .event-card { background: #fff; box-shadow: 0 8px 24px rgba(15,23,42,0.05); }
    .overview-card { background: rgba(248,250,252,0.75); }
    .event-card::before, .overview-card::before {
      content: ""; position: absolute; left: -14px; width: 18px; height: 18px; border-radius: 999px;
      background: #0f172a;
    }
    .event-card::before { top: 28px; box-shadow: 0 0 0 4px #f8fafc; }
    .overview-card::before { top: 24px; box-shadow: 0 0 0 4px #fff; }
    .icon-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .muted { color: #64748b; }
    .small { font-size: 12px; }
    .debug-pass { background:#0f172a; color:#fff; border:none; }
    .debug-fail { background:#ef4444; color:#fff; border:none; }

    .auth-layout { display:grid; grid-template-columns:1.05fr 0.95fr; gap:24px; }
    .profile-layout { display:grid; grid-template-columns:minmax(320px,0.95fr) minmax(0,1.25fr); gap:18px; }
    .welcome-actions, .builder-floating-actions, .intro-actions {
      display:flex; justify-content:space-between; align-items:center; gap:12px;
    }
    .welcome-actions { position:fixed; left:24px; right:24px; bottom:24px; z-index:20; pointer-events:none; }
    .welcome-actions .btn, .builder-floating-actions .btn { pointer-events:auto; }
    .builder-floating-actions {
      position:fixed; left:32px; right:32px; bottom:32px; z-index:50;
    }
    .intro-actions {
      position:absolute; left:32px; right:32px; bottom:32px;
    }
    .intro-actions > div { display:flex; }
    @media (max-width: 960px) {
      .hero, .grid-2, .auth-layout, .profile-layout { grid-template-columns: 1fr !important; }
      .options-grid { grid-template-columns: repeat(4,minmax(0,1fr)); }
      .page { padding: 16px; }
      .shell { max-width: 100%; }
      .card { border-radius: 20px; }
      .btn { min-height: 46px; padding: 12px 16px; }
      input, textarea, select { font-size: 16px; }
      .section-title { font-size: 24px; }
      .avatar-circle { width: min(72vw, 280px); height: min(72vw, 280px); }
      .default-avatar { width: min(48vw, 190px); height: min(48vw, 190px); font-size: min(18vw, 72px); }
      .avatar-grid { grid-template-columns: repeat(4, minmax(0,1fr)); }
      .mapbox { min-height: 460px; padding: 14px; border-radius: 22px; }
      .pin { font-size: 13px; }
      .overview-poster { padding: 16px; border-radius: 24px; }
      .overview-hero { padding: 18px; border-radius: 22px; }
      .metric-grid { grid-template-columns: 1fr; }

      .overview-poster { overflow: visible; }
      .stage-poster-card { padding: 14px; }
      .stage-poster-card > div { flex-direction: column; }
      .stage-poster-card > div > div, .overview-card > div > div { min-width: 0 !important; width: 100%; }
      .stage-poster-card .icon-row, .overview-card .icon-row, .place-cloud { gap: 8px; }
      #overviewCapture { width: 100%; }
      .timeline { padding-left: 10px; }
      .timeline-line { left: 11px; }
      .event-card, .overview-card { padding: 16px; border-radius: 18px; }
      .event-card::before, .overview-card::before { left: -10px; width: 14px; height: 14px; }
      .builder-floating-actions, .welcome-actions, .intro-actions {
        left: 12px; right: 12px; bottom: 12px;
        display: grid; grid-template-columns: 1fr 1fr;
      }
      .builder-floating-actions .btn, .welcome-actions .btn, .intro-actions .btn {
        width: 100%;
      }
      .topbar { margin-bottom: 18px; }
      body { padding-bottom: env(safe-area-inset-bottom, 0); }
    }
    @media (max-width: 640px) {
      .page { padding: 12px; }
      .hero { min-height: auto; gap: 18px; }
      .auth-layout { gap: 16px; }
      .options-grid { grid-template-columns: repeat(4, minmax(0,1fr)); gap: 8px; }
      .count-grid { grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; }
      .option-btn { padding: 8px 6px; border-radius: 14px; min-height: 78px; }
      .option-btn > div:first-child { font-size: 16px !important; }
      .option-btn > div:nth-child(2) { margin-top: 3px !important; font-size: 11px !important; line-height: 1.25 !important; }
      .avatar-grid { grid-template-columns: repeat(4, minmax(0,1fr)); gap: 8px; }
      .avatar-choice { height: 50px; border-radius: 14px; font-size: 20px; }
      .topbar { flex-direction: column; align-items: stretch; }
      .topbar > * { width: 100%; }
      .badge { width: fit-content; max-width: 100%; padding: 4px 8px; font-size: 10px; }
      .btn { min-height: 40px; padding: 9px 12px; font-size: 13px; }
      .mapbox { min-height: 320px; padding: 10px; }
      .pin { font-size: 10px; }
      .pin span { margin-right: 2px; }
      .timeline-list { gap: 14px; }
      .event-card, .overview-card, .metric-card, .stage-poster-card { padding: 10px; border-radius: 15px; }
      .event-card::before, .overview-card::before { width: 12px; height: 12px; left: -8px; }
      .icon-row { gap: 5px; margin-top: 8px; }
      .overview-poster { padding: 12px; border-radius: 20px; }
      .overview-hero { padding: 14px; margin-bottom: 14px; border-radius: 18px; }
      .overview-hero > div > div:first-child > div:first-child { font-size: 24px !important; }
      .metric-card div[style*="font-size:30px"] { font-size: 20px !important; }
      .place-cloud { gap: 6px; }
      .place-chip { padding: 4px 9px; font-size: 10px; }
      input, textarea { padding: 10px 12px; border-radius: 14px; }
      textarea { min-height: 96px; }
      h1#helloNicknameTitle { font-size: 42px !important; }
      .builder-floating-actions, .welcome-actions, .intro-actions {
        grid-template-columns: 1fr 1fr;
      }
      .intro-actions > div { width: 100%; }
      #overviewCapture { width: 100%; max-width: 100%; }
    }

  </style>
</head>

    function getBirthDateFromMonthString(birthValue) {
      if (!birthValue) return null;
      if (/^\d{4}-\d{2}-\d{2}$/.test(birthValue)) {
        const date = new Date(`${birthValue}T00:00:00`);
        return Number.isNaN(date.getTime()) ? null : date;
      }
      if (/^\d{4}-\d{2}$/.test(birthValue)) {
        const date = new Date(`${birthValue}-01T00:00:00`);
        return Number.isNaN(date.getTime()) ? null : date;
      }
      return null;
    }

    function getLatestEventDate() {
      if (!Array.isArray(state.events) || !state.events.length) return null;
      const timestamps = state.events
        .map(event => new Date(event.endDate || event.startDate || '').getTime())
        .filter(value => Number.isFinite(value));
      if (!timestamps.length) return null;
      return new Date(Math.max(...timestamps));
    }

    function getLifeProgressPercent() {
      const birthDate = getBirthDateFromMonthString(state.birthMonth);
      const latestEventDate = getLatestEventDate();
      if (!birthDate || !latestEventDate) return 0;
      const diff = latestEventDate.getTime() - birthDate.getTime();
      if (!Number.isFinite(diff) || diff <= 0) return 0;
      const hundredYears = 100 * 365.2425 * 24 * 60 * 60 * 1000;
      const rawPercent = (diff / hundredYears) * 100;
      return Math.max(0, Math.min(100, Math.round(rawPercent * 10) / 10));
    }

    function formatMonthDisplay(monthString) {
      if (/^\d{4}-\d{2}-\d{2}$/.test(monthString || '')) {
        const [year, month, day] = monthString.split('-');
        return `${year}年${Number(month)}月${Number(day)}日`;
      }
      if (/^\d{4}-\d{2}$/.test(monthString || '')) {
        const [year, month] = monthString.split('-');
        return `${year}年${Number(month)}月`;
      }
      return '未填写';
    }

    function formatDateDisplay(dateString) {
      if (!/^\d{4}-\d{2}-\d{2}$/.test(dateString || '')) return '未填写';
      const [year, month, day] = dateString.split('-');
      return `${year}年${Number(month)}月${Number(day)}日`;

    function getDurationLabel(startDate, endDate) {
      const start = new Date(startDate || '');
      const end = new Date(endDate || '');
      if (Number.isNaN(start.getTime()) || Number.isNaN(end.getTime()) || end < start) return '时长待确认';
      let months = (end.getFullYear() - start.getFullYear()) * 12 + (end.getMonth() - start.getMonth());
      if (end.getDate() >= start.getDate()) months += 1;
      months = Math.max(1, months);
      const years = Math.floor(months / 12);
      const remainMonths = months % 12;
      if (years > 0 && remainMonths > 0) return `持续 ${years}年${remainMonths}个月`;
      if (years > 0) return `持续 ${years}年`;
      return `持续 ${remainMonths}个月`;
    }

        const detail = (getCustomEntry(event?.customEntries || {}, 'travel', key)?.name || '').trim();

        return option.label;
      }).filter(Boolean);

        if (basePlace && basePlace !== '地点未填写') allPlaces.push(basePlace);
        allPlaces.push(...getTravelPlacesFromEvent(event));
      });
      return [...new Set(allPlaces)];

      const latestEvent = [...sortedEvents].sort((a, b) => new Date(b.endDate || b.startDate).getTime() - new Date(a.endDate || a.startDate).getTime())[0] || null;
      const earliestEvent = sortedEvents[0] || null;
      return {
        sortedEvents,
        totalSegments: sortedEvents.length,
        uniquePlaces,
        latestEvent,
        earliestEvent

      const value = selections?.[groupKey];

    function getSingleSelection(selections, groupKey) {
      const value = selections?.[groupKey];
      return typeof value === "string" ? value : "";
    }
    function shouldShowCount(groupKey, optionKey) {
      const group = iconGroups[groupKey];
      if (!group?.quantityEnabled) return false;
      if (!group.quantityKeys) return true;
      return group.quantityKeys.includes(optionKey);
    }
    function shouldRenderCountForKey(selections, key) {
      return getMultiSelections(selections, "pets").includes(key) ||
        (getMultiSelections(selections, "life").includes(key) && shouldShowCount("life", key));
    }
    function getCustomEntryKey(groupKey, optionKey) {
      return `${groupKey}:${optionKey}`;

      return customEntries?.[getCustomEntryKey(groupKey, optionKey)] || null;

    function getAllSelectedIcons(selections, counts = {}, customEntries = {}) {
      const grouped = [
        ["gender", [getSingleSelection(selections, "gender")]],
        ["career", getMultiSelections(selections, "career")],
        ["relationship", getMultiSelections(selections, "relationship")],
        ["pets", getMultiSelections(selections, "pets")],
        ["life", getMultiSelections(selections, "life")],
        ["hobby", getMultiSelections(selections, "hobby")],
        ["travel", getMultiSelections(selections, "travel")],
      ];
      return grouped.flatMap(([groupKey, keys]) =>
        keys.filter(Boolean).map((key) => {
          const icon = iconLookup[key];
          if (!icon) return null;
          const custom = getCustomEntry(customEntries, groupKey, key);
          const detailText = custom?.name?.trim() || "";
          return {
            ...icon,
            count: getCountValue(counts, key),
            label: groupKey === "travel" ? (detailText ? `${icon.label} · ${detailText}` : icon.label) : (detailText || icon.label),
            emoji: custom?.emoji?.trim() || icon.emoji,
            groupKey
          };
        }).filter(Boolean)
      );
    }

      return getAllSelectedIcons(selections, counts, customEntries).flatMap((icon) => {
        const repeat = shouldRenderCountForKey(selections, icon.key) ? icon.count : 1;
        return Array.from({ length: repeat }, (_, index) => ({ ...icon, instanceKey: `${icon.groupKey}-${icon.key}-${index}` }));
      });
    }

            <div style="position:relative;height:580px;border-radius:22px">

    function renderCountInputs(groupKey) {
      const visibleKeys = getMultiSelections(state.builder.selections, groupKey).filter((key) => shouldShowCount(groupKey, key));
      if (!visibleKeys.length) return '';
      return `
        <div style="border-radius:18px;background:#f8fafc;padding:16px">
          <div style="margin-bottom:12px;display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;color:#1e293b"># ${(iconGroups[groupKey]).title}数量</div>
          <div class="count-grid">
            ${visibleKeys.map(key => {
              const icon = iconLookup[key];
              return `
                <div style="border-radius:16px;border:1px solid #e2e8f0;background:#fff;padding:12px">
                  <div style="margin-bottom:8px;display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;color:#334155">
                    <span style="font-size:20px">${icon?.emoji || ''}</span><span>${icon?.label || key}</span>
                  </div>
                  <input type="number" min="1" class="count-input" data-count-key="${key}" value="${state.builder.counts[key] ?? 1}" style="height:40px;border-radius:12px" />
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `;
    }

    function renderCustomEntryFields(groupKey, optionKey) {
      const custom = getCustomEntry(state.builder.customEntries, groupKey, optionKey) || { name: "", emoji: "" };
      return `
        <div style="margin-top:10px;display:grid;grid-template-columns:1fr 88px;gap:8px">
          <input class="custom-name-input" data-group="${groupKey}" data-key="${optionKey}" value="${custom.name || ''}" placeholder="输入名字" style="height:38px;border-radius:12px;font-size:13px" />
          <input class="custom-emoji-input" data-group="${groupKey}" data-key="${optionKey}" value="${custom.emoji || ''}" placeholder="图标" style="height:38px;border-radius:12px;font-size:13px;text-align:center" />
        </div>
      `;
    }

    function renderTravelEntryFields(groupKey, optionKey, provinceLabel) {
      const custom = getCustomEntry(state.builder.customEntries, groupKey, optionKey) || { name: "", emoji: "" };
      const placeholder = provinceLabel === '海外' ? '例如：日本东京 / 澳大利亚悉尼' : `例如：${provinceLabel}下的具体城市或区域`;
      return `
        <div style="margin-top:10px">
          <input class="custom-name-input" data-group="${groupKey}" data-key="${optionKey}" value="${custom.name || ''}" placeholder="${placeholder}" style="height:38px;border-radius:12px;font-size:13px" />
        </div>
      `;
    }

    function renderCategorySelector(groupKey) {
      const group = iconGroups[groupKey];
      const currentSingle = getSingleSelection(state.builder.selections, groupKey);
      const currentMulti = getMultiSelections(state.builder.selections, groupKey);
      return `
        <div style="display:grid;gap:12px">
          <div style="display:flex;align-items:center;gap:8px">
            <div style="font-size:14px;font-weight:700;color:#1e293b">${group.title}</div>
            ${badge(group.type === 'single' ? '单选' : '多选')}
          </div>
          <div class="options-grid">
            ${group.options.map(item => {
              const active = group.type === 'single' ? currentSingle === item.key : currentMulti.includes(item.key);
              const isOther = item.key.startsWith('other-');
              const isTravel = groupKey === 'travel';
              const count = shouldShowCount(groupKey, item.key) && active ? getCountValue(state.builder.counts, item.key) : null;
              return `
                <div>
                  <button class="option-btn ${active ? 'active' : ''}" data-group="${groupKey}" data-option-key="${item.key}" style="background:${active ? '#0f172a' : item.bg};color:${active ? '#fff' : item.text}">
                    <div style="font-size:24px">${item.emoji}</div>
                    <div style="margin-top:6px;font-size:14px;font-weight:700">${item.label}</div>
                    ${count ? `<div style="margin-top:8px;display:inline-flex;border-radius:9999px;padding:2px 8px;font-size:12px;background:${active ? 'rgba(255,255,255,0.18)' : 'rgba(255,255,255,0.7)'};color:${active ? '#fff' : '#334155'}">x${count}</div>` : ``}
                  </button>
                  ${active && isOther ? renderCustomEntryFields(groupKey, item.key) : ''}
                  ${active && isTravel ? renderTravelEntryFields(groupKey, item.key, item.label) : ''}
                </div>
              `;
            }).join('')}
          </div>
          ${group.type === 'multi' ? renderCountInputs(groupKey) : ''}
        </div>
      `;
    }

    function renderSelectedIcons() {
      const icons = getAllSelectedIcons(state.builder.selections, state.builder.counts, state.builder.customEntries);
      return `
        <div style="border-radius:24px;background:linear-gradient(135deg, rgba(254,249,195,0.35), rgba(224,231,255,0.35));border:1px solid rgba(226,232,240,0.9);padding:18px;margin-top:24px">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap">

            ${badge(`${icons.length} 个`)}

          <div class="icon-row">
            ${icons.map(icon => badge(`${icon.emoji} ${icon.label}${shouldRenderCountForKey(state.builder.selections, icon.key) ? ` ×${icon.count}` : ''}`)).join('')}
          </div>
        </div>
      `;
    }

    function renderEventCard(item, index = 0) {
      const selectedIcons = getAllSelectedIcons(item.selections, item.counts, item.customEntries || {});
      return `
        <div class="event-card" style="animation-delay:${Math.min(index * 0.08, 0.72)}s">
          <div style="display:flex;gap:16px;justify-content:space-between;align-items:flex-start">

              <div class="icon-row">

            </div>
          </div>
        </div>
      `;
    }

            <div>
              <div style="font-size:14px;font-weight:700;color:#0f172a">运行自检</div>
              <div class="small muted" style="margin-top:4px">用于检查数量、选择和辅助逻辑是否正常</div>
            </div>
          </div>

          </div>
        </div>
      `;
    }

                  </div>
                </div>
                <div style="width:260px;min-width:220px">

                </div>

                <div class="grid-2" style="margin-bottom:20px">
                  <div>
                    <label style="display:block;margin-bottom:8px;font-size:14px;font-weight:700;color:#334155">开始日期</label>
                    <input id="builderStartDate" type="date" value="${state.builder.startDate}" />
                  </div>
                  <div>
                    <label style="display:block;margin-bottom:8px;font-size:14px;font-weight:700;color:#334155">结束日期</label>

                <div style="margin-bottom:20px">
                  <label style="display:block;margin-bottom:8px;font-size:14px;font-weight:700;color:#334155">阶段标题</label>

                <div style="display:grid;gap:22px">

    async function saveOverviewImage() {
      const target = document.getElementById('overviewCapture');
      if (!target || !window.html2canvas) {
        alert('保存图片失败，请稍后再试。');
        return;
      }

      const wrapper = document.createElement('div');
      const clone = target.cloneNode(true);
      clone.id = 'overviewCaptureExport';

      wrapper.style.position = 'absolute';
      wrapper.style.left = '-20000px';
      wrapper.style.top = '0';
      wrapper.style.zIndex = '-1';
      wrapper.style.pointerEvents = 'none';
      wrapper.style.opacity = '0';
      wrapper.style.background = '#ffffff';
      wrapper.style.padding = '0';
      wrapper.style.margin = '0';
      wrapper.style.width = '1080px';
      wrapper.style.overflow = 'visible';

      clone.style.width = '1080px';
      clone.style.maxWidth = '1080px';
      clone.style.minWidth = '1080px';
      clone.style.overflow = 'visible';
      clone.style.transform = 'none';
      clone.style.animation = 'none';
      clone.querySelectorAll('*').forEach((node) => {
        node.style.animation = 'none';
        node.style.transition = 'none';
        node.style.transform = 'none';
        node.style.maxHeight = 'none';
        node.style.overflow = 'visible';
      });

      wrapper.appendChild(clone);
      document.body.appendChild(wrapper);

      try {
        await new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));
        const captureWidth = Math.max(clone.scrollWidth, clone.offsetWidth, 1080);
        const captureHeight = Math.max(clone.scrollHeight, clone.offsetHeight, clone.getBoundingClientRect().height);

        const canvas = await window.html2canvas(clone, {
          backgroundColor: '#ffffff',
          scale: 2,
          useCORS: true,
          scrollX: 0,
          scrollY: 0,
          width: captureWidth,
          height: captureHeight,
          windowWidth: captureWidth,
          windowHeight: captureHeight,
          foreignObjectRendering: false,
          onclone: (doc) => {
            const copied = doc.getElementById('overviewCaptureExport') || doc.getElementById('overviewCapture');
            if (copied) {
              copied.style.width = '1080px';
              copied.style.maxWidth = '1080px';
              copied.style.minWidth = '1080px';
              copied.style.overflow = 'visible';
              copied.style.transform = 'none';
            }
            doc.querySelectorAll('*').forEach((node) => {
              node.style.animation = 'none';
              node.style.transition = 'none';
              node.style.transform = 'none';
              node.style.maxHeight = 'none';
              node.style.overflow = 'visible';
            });
            doc.body.style.background = '#ffffff';
            doc.documentElement.style.background = '#ffffff';
            doc.body.style.overflow = 'visible';
            doc.documentElement.style.overflow = 'visible';
          }
        });

        const link = document.createElement('a');
        link.download = '人生轨迹纵览.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      } catch (error) {
        alert('保存图片失败，请稍后再试。');
      } finally {
        if (document.body.contains(wrapper)) document.body.removeChild(wrapper);
      }
    }

    function bindEvents() {
      const byId = id => document.getElementById(id);

      byId('switchLoginBtn')?.addEventListener('click', () => { state.authMode = 'login'; state.authErrorMessage = ''; renderApp(); });
      byId('switchRegisterBtn')?.addEventListener('click', () => { state.authMode = 'register'; state.authErrorMessage = ''; renderApp(); });
      byId('enterAppBtn')?.addEventListener('click', () => {
        const n = byId('authNickname');
        const birthMonthInput = byId('authBirthMonth');
        const email = byId('authEmail');
        const pwd = byId('authPassword');
        if (n) state.authForm.nickname = n.value;
        if (birthMonthInput) state.authForm.birthMonth = birthMonthInput.value;
        if (email) state.authForm.email = email.value;
        if (pwd) state.authForm.password = pwd.value;

        const nickname = (state.authForm.nickname || '').trim();
        const birthMonth = state.authForm.birthMonth || '';
        const safeEmail = (state.authForm.email || '').trim().toLowerCase();
        const password = state.authForm.password || '';

        if (!safeEmail || !password || (state.authMode === 'register' && (!nickname || !birthMonth))) {
          state.authErrorMessage = '请先把需要的信息填写完整，出生日期请从日历里选择。';
          renderApp();
          return;
        }

        if (state.authMode === 'register') {
          if (!isStrongPassword(password)) {
            state.authErrorMessage = '密码必须至少 8 位，并同时包含小写字母、大写字母和数字。';
            renderApp();
            return;
          }
          if (findUserByEmail(safeEmail)) {
            state.authErrorMessage = '这个邮箱已经注册过了，请直接登录。';
            renderApp();
            return;
          }
          upsertUser({
            nickname,
            birthMonth,
            email: safeEmail,
            password,
            avatar: state.avatar,
            defaultAvatar: state.defaultAvatar,
            histories: cloneHistories(defaultHistoryTemplates),
            currentDraft: buildCurrentDraftSnapshot(),
          });
          state.nickname = nickname;
          state.birthMonth = birthMonth;
          state.authForm.nickname = nickname;
          state.authForm.birthMonth = birthMonth;
          state.authForm.email = safeEmail;
          state.authForm.password = password;
          state.currentUserEmail = safeEmail;
          state.isAuthenticated = true;
          state.histories = cloneHistories(defaultHistoryTemplates);
          state.activeHistoryId = null;
          state.authErrorMessage = '';
          state.profileMessage = null;
          state.profileForm.password = password;
          state.page = 1;
          renderApp();
          return;
        }

        const currentUser = findUserByEmail(safeEmail);
        if (!currentUser || currentUser.password !== password) {
          state.authErrorMessage = '邮箱或密码不正确，请重新输入。';
          renderApp();
          return;
        }
        state.nickname = currentUser.nickname || state.nickname;
        state.birthMonth = currentUser.birthMonth || '';
        state.authForm.nickname = state.nickname;
        state.authForm.birthMonth = state.birthMonth;
        state.authForm.email = safeEmail;
        state.authForm.password = password;
        state.currentUserEmail = safeEmail;
        state.isAuthenticated = true;
        state.histories = cloneHistories(currentUser.histories || []);
        state.activeHistoryId = null;
        state.avatar = currentUser.avatar || '';
        state.defaultAvatar = currentUser.defaultAvatar || state.defaultAvatar || 'girl';
        applySnapshot(currentUser.currentDraft || {
          nickname: currentUser.nickname,
          birthMonth: currentUser.birthMonth,
          avatar: currentUser.avatar,
          defaultAvatar: currentUser.defaultAvatar,
          events: state.events,
        });
        state.authErrorMessage = '';
        state.profileMessage = null;
        state.profileForm.password = currentUser.password || '';
        state.page = 1;
        renderApp();
      });

      byId('guestEnterBtn')?.addEventListener('click', () => {
        state.isAuthenticated = false;
        state.currentUserEmail = '';
        state.birthMonth = '';
        state.histories = cloneHistories(defaultHistoryTemplates);
        state.activeHistoryId = null;
        state.authErrorMessage = '';
        state.profileMessage = null;
        state.profileForm.password = '';
        state.page = 1;
        renderApp();
      });

      byId('logoutFromWelcomeBtn')?.addEventListener('click', () => {
        state.isAuthenticated = false;
        state.currentUserEmail = '';
        state.birthMonth = '';
        state.authForm.password = '';
        state.authErrorMessage = '';
        state.profileMessage = null;
        state.profileForm.password = '';
        state.page = 0;
        renderApp();
      });

      byId('homeNicknameInput')?.addEventListener('input', (e) => {
        state.nickname = e.target.value;
        saveCurrentUserProfileChanges();
        saveCurrentDraftForUser();
        const helloTitle = document.getElementById('helloNicknameTitle');
        if (helloTitle) {
          helloTitle.textContent = `Hello，${state.nickname || "xxx"}`;
        }
      });

      byId('homeBirthMonthInput')?.addEventListener('input', (e) => {
        state.birthMonth = e.target.value || '';
        saveCurrentUserProfileChanges();
        saveCurrentDraftForUser();
      });

      byId('avatarUpload')?.addEventListener('change', (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          state.avatar = typeof reader.result === 'string' ? reader.result : '';
          state.defaultAvatar = '';
          saveCurrentDraftForUser();
          renderApp();
        };
        reader.readAsDataURL(file);
      });

      byId('useDefaultAvatar')?.addEventListener('click', () => {
        state.avatar = '';
        saveCurrentDraftForUser();
        renderApp();
      });

      document.querySelectorAll('[data-avatar-key]').forEach(el => {
        el.addEventListener('click', () => {
          state.avatar = '';
          state.defaultAvatar = el.dataset.avatarKey;
          saveCurrentDraftForUser();
          renderApp();
        });
      });

      byId('goIntroBtn')?.addEventListener('click', () => { state.page = 2; renderApp(); });
      byId('backToWelcomeBtn')?.addEventListener('click', () => { state.page = 1; renderApp(); });
      byId('enterBuilderBtn')?.addEventListener('click', () => { state.page = 3; renderApp(); });
      byId('backToIntroBtn')?.addEventListener('click', () => { state.page = 2; renderApp(); });
      byId('openProfileBtn')?.addEventListener('click', () => {
        if (state.isAuthenticated) {
          const currentUser = findUserByEmail(state.currentUserEmail);
          state.profileForm.password = currentUser?.password || state.profileForm.password || '';
        }
        state.profileMessage = null;
        state.page = 5;
        renderApp();
      });
      byId('openOverviewBtn')?.addEventListener('click', () => { state.page = 4; renderApp(); });
      byId('backFromOverviewBtn')?.addEventListener('click', () => { state.page = 3; renderApp(); });
      byId('backFromProfileBtn')?.addEventListener('click', () => { state.page = 3; renderApp(); });
      byId('backFromProfileBtnSecondary')?.addEventListener('click', () => { state.page = 3; renderApp(); });
      byId('goRegisterFromProfileBtn')?.addEventListener('click', () => { state.page = 0; renderApp(); });
      byId('logoutBtn')?.addEventListener('click', () => {
        state.isAuthenticated = false;
        state.currentUserEmail = '';
        state.birthMonth = '';
        state.authForm.password = '';
        state.authErrorMessage = '';
        state.profileMessage = null;
        state.profileForm.password = '';
        state.page = 0;
        renderApp();
      });
      byId('saveProfileBtn')?.addEventListener('click', () => {
        if (!state.isAuthenticated || !state.currentUserEmail) return;
        const nickname = (byId('profileNicknameInput')?.value || '').trim();
        const nextEmail = (byId('profileEmailInput')?.value || '').trim().toLowerCase();
        const nextPassword = byId('profilePasswordInput')?.value || '';
        const nextBirthMonth = byId('profileBirthMonthInput')?.value || '';
        const currentUser = findUserByEmail(state.currentUserEmail);

        if (!currentUser) {
          state.profileMessage = { type: 'error', text: '当前账号信息读取失败，请重新登录后再试。' };
          renderApp();
          return;
        }
        if (!nickname || !nextEmail || !nextPassword || !nextBirthMonth) {
          state.profileMessage = { type: 'error', text: '昵称、邮箱、密码和出生日期都需要完整填写。' };
          renderApp();
          return;
        }
        if (!isStrongPassword(nextPassword)) {
          state.profileMessage = { type: 'error', text: '密码必须至少 8 位，并同时包含小写字母、大写字母和数字。' };
          renderApp();
          return;
        }
        const existingUser = findUserByEmail(nextEmail);
        if (existingUser && (existingUser.email || '').trim().toLowerCase() !== (state.currentUserEmail || '').trim().toLowerCase()) {
          state.profileMessage = { type: 'error', text: '这个邮箱已经被其他账号使用了，请换一个邮箱。' };
          renderApp();
          return;
        }

        if (nextEmail !== (state.currentUserEmail || '').trim().toLowerCase()) {
          const remainingUsers = getStoredUsers().filter(user => (user.email || '').trim().toLowerCase() !== (state.currentUserEmail || '').trim().toLowerCase());
          saveStoredUsers(remainingUsers);
        }

        upsertUser({
          ...currentUser,
          nickname,
          birthMonth: nextBirthMonth,
          email: nextEmail,
          password: nextPassword,
          avatar: state.avatar,
          defaultAvatar: state.defaultAvatar,
          histories: cloneHistories(state.histories),
          currentDraft: buildCurrentDraftSnapshot(),
        });

        state.nickname = nickname;
        state.birthMonth = nextBirthMonth;
        state.currentUserEmail = nextEmail;
        state.authForm.nickname = nickname;
        state.authForm.birthMonth = nextBirthMonth;
        state.authForm.email = nextEmail;
        state.authForm.password = nextPassword;
        state.profileForm.password = nextPassword;
        state.profileMessage = { type: 'success', text: '账户资料已经保存成功，昵称、邮箱、密码和出生日期都已同步更新。' };
        renderApp();
      });
      document.querySelectorAll('.openHistoryBtn').forEach(el => {
        el.addEventListener('click', () => {
          openSavedHistory(Number(el.dataset.historyId));
          state.page = 3;
          renderApp();
        });
      });
      document.querySelectorAll('.deleteHistoryBtn').forEach(el => {
        el.addEventListener('click', () => {
          const id = Number(el.dataset.historyId);
          if (!Number.isFinite(id)) return;
          state.histories = state.histories.filter(history => Number(history.id) !== id);
          if (state.activeHistoryId === id) state.activeHistoryId = null;
          syncCurrentUserHistories();
          renderApp();
        });
      });

      document.querySelectorAll('.pin').forEach(el => {
        el.addEventListener('click', () => {
          state.builder.province = el.dataset.province;
          renderApp();
        });
      });

      byId('builderStartDate')?.addEventListener('input', e => updateBuilderField('startDate', e.target.value));
      byId('builderEndDate')?.addEventListener('input', e => updateBuilderField('endDate', e.target.value));
      byId('builderTitle')?.addEventListener('input', e => updateBuilderField('title', e.target.value));
      byId('builderProvince')?.addEventListener('input', e => updateBuilderField('province', e.target.value));
      byId('builderCity')?.addEventListener('input', e => updateBuilderField('city', e.target.value));
      byId('builderNote')?.addEventListener('input', e => updateBuilderField('note', e.target.value));

      document.querySelectorAll('.option-btn').forEach(el => {
        el.addEventListener('click', () => {
          const groupKey = el.dataset.group;
          const key = el.dataset.optionKey;
          const group = iconGroups[groupKey];
          if (group.type === 'single') {
            state.builder.selections[groupKey] = key;
          } else {
            state.builder.selections[groupKey] = toggleMultiOption(getMultiSelections(state.builder.selections, groupKey), key);
            if (shouldShowCount(groupKey, key) && state.builder.counts[key] == null) {
              state.builder.counts[key] = 1;
            }
          }
          renderApp();
        });
      });

      document.querySelectorAll('.count-input').forEach(el => {
        el.addEventListener('input', () => {
          const key = el.dataset.countKey;
          state.builder.counts[key] = Math.max(1, Number(el.value) || 1);
        });
      });

      document.querySelectorAll('.custom-name-input').forEach(el => {
        el.addEventListener('input', () => {
          const k = getCustomEntryKey(el.dataset.group, el.dataset.key);
          const prev = state.builder.customEntries[k] || { name: '', emoji: '' };
          state.builder.customEntries[k] = { ...prev, name: el.value };
        });
      });

      document.querySelectorAll('.custom-emoji-input').forEach(el => {
        el.addEventListener('input', () => {
          const k = getCustomEntryKey(el.dataset.group, el.dataset.key);
          const prev = state.builder.customEntries[k] || { name: '', emoji: '' };
          state.builder.customEntries[k] = { ...prev, emoji: el.value };
        });
      });

      byId('addEventBtn')?.addEventListener('click', () => {
        if (!state.builder.startDate || !state.builder.endDate || !state.builder.title.trim()) {
          state.builder.errorMessage = '请先填写完整的时间段和阶段标题。';
          renderApp();
          return;
        }
        if (!isValidDateRange(state.builder.startDate, state.builder.endDate)) {
          state.builder.errorMessage = '结束日期不能早于开始日期。';
          renderApp();
          return;
        }
        const payload = {
          title: state.builder.title.trim(),
          startDate: state.builder.startDate,
          endDate: state.builder.endDate,
          province: state.builder.province,
          city: state.builder.city,
          note: state.builder.note,
          selections: JSON.parse(JSON.stringify(state.builder.selections)),
          counts: JSON.parse(JSON.stringify(state.builder.counts)),
          customEntries: JSON.parse(JSON.stringify(state.builder.customEntries)),
        };
        if (state.builder.editingEventId) {
          state.events = state.events.map(item => item.id === state.builder.editingEventId ? { ...item, ...payload } : item);
        } else {
          state.events.push({
            id: Date.now(),
            ...payload,
          });
        }
        state.builder.errorMessage = '';
        markLatestHistory();
        resetBuilder(payload.province || "浙江");
        renderApp();
      });

      byId('cancelEditBtn')?.addEventListener('click', () => {
        resetBuilder(state.builder.province || "浙江");
        renderApp();
      });

      document.querySelectorAll('.edit-event-btn').forEach(el => {
        el.addEventListener('click', () => {
          const id = Number(el.dataset.eventId);
          const target = state.events.find(item => item.id === id);
          if (!target) return;
          state.builder = {
            title: target.title || "",
            startDate: target.startDate || "",
            endDate: target.endDate || "",
            province: target.province || "浙江",
            city: target.city || "",
            note: target.note || "",
            selections: JSON.parse(JSON.stringify(target.selections || { gender: "female", career: [], relationship: [], pets: [], life: [], hobby: [] })),
            counts: JSON.parse(JSON.stringify(target.counts || {})),
            customEntries: JSON.parse(JSON.stringify(target.customEntries || {})),
            errorMessage: "",
            editingEventId: target.id,
          };
          renderApp();
          document.querySelector('.section-title')?.scrollIntoView({ behavior: 'smooth', block: 'center' });
        });
      });

      document.querySelectorAll('.delete-event-btn').forEach(el => {
        el.addEventListener('click', () => {
          const id = Number(el.dataset.eventId);
          state.events = state.events.filter(item => item.id !== id);
          if (state.builder.editingEventId === id) {
            resetBuilder(state.builder.province || "浙江");
          }
          markLatestHistory();
          renderApp();
        });
      });

      byId('saveHistoryBtn')?.addEventListener('click', () => {
        const ok = saveCurrentHistoryToProfile();
        if (ok) alert('已保存到个人页面，你下次登录后也还能看到。');
      });
      byId('saveImageBtn')?.addEventListener('click', saveOverviewImage);
    }

    renderApp();
  </script>
</body>
</html>
